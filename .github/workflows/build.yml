name: Build and Test

on:
  push:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential dpkg-dev
    
    - name: Build and test
      run: |
        chmod +x build.sh
        ./build.sh
    
    - name: Upload Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: Release/*.deb
